services:
  postgres:
    image: postgres:16-alpine
    container_name: job4j_devops_db
    shm_size: 128mb
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job4j_devops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  job4j_devops:
    build: .
    image: krsobas/job4j_devops:latest
    container_name: devops
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://job4j_devops_db:5432/job4j_devops
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-password}

volumes:
  postgres_data:
